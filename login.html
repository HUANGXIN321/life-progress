<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生进度 - 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #f472b6;
            --bg-dark: #0f0b1a;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* 粒子Canvas背景 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 渐变背景叠加 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(244, 114, 182, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            z-index: 1;
        }

        /* 主容器 */
        .login-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 玻璃态卡片 */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo区域 */
        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        /* Tab切换 */
        .tab-container {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.4);
        }

        .tab-btn:hover:not(.active) {
            color: var(--text);
        }

        /* 表单 */
        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i {
            color: var(--primary-light);
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #86efac;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        .toast.info {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: #a5b4fc;
        }

        /* 底部文字 */
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .glass-card {
                padding: 32px 24px;
                border-radius: 20px;
            }
            .logo-area h1 {
                font-size: 24px;
            }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="bg-overlay"></div>

    <div class="login-container">
        <div class="glass-card">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <h1>人生进度</h1>
                <p>记录每一步，规划每一天</p>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
                <button class="tab-btn" data-tab="register" onclick="switchTab('register')">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </div>

            <!-- 登录表单 -->
            <div class="form-panel active" id="loginPanel">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <input type="text" id="loginUsername" placeholder="请输入用户名" required autocomplete="username">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="loginPassword" placeholder="请输入密码" required autocomplete="current-password">
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="loginBtn">
                        <i class="fas fa-arrow-right-to-bracket"></i> 登录
                    </button>
                </form>
            </div>

            <!-- 注册表单 -->
            <div class="form-panel" id="registerPanel">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <input type="text" id="regUsername" placeholder="请设置用户名（3-20字符）" required minlength="3" maxlength="20" autocomplete="username">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>昵称</label>
                        <div class="input-wrapper">
                            <input type="text" id="regNickname" placeholder="请设置昵称" required maxlength="20">
                            <i class="fas fa-id-card"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="regPassword" placeholder="请设置密码（6位以上）" required minlength="6" autocomplete="new-password">
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="regConfirm" placeholder="请再次输入密码" required minlength="6" autocomplete="new-password">
                            <i class="fas fa-shield-halved"></i>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="registerBtn">
                        <i class="fas fa-user-check"></i> 注册
                    </button>
                </form>
            </div>

            <div class="footer-text">
                人生进度 &copy; 2024 &mdash; TRAE AI创造力大赛参赛作品
            </div>
        </div>
    </div>

    <!-- Toast容器 -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== 粒子动画 ====================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.speedY = (Math.random() - 0.5) * 0.8;
                this.opacity = Math.random() * 0.5 + 0.2;
                // 随机颜色：紫色或粉色
                this.color = Math.random() > 0.5 ? '99, 102, 241' : '244, 114, 182';
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;

                // 鼠标吸引效果
                if (mouse.x !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        this.x += dx * 0.005;
                        this.y += dy * 0.005;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(80, Math.floor((canvas.width * canvas.height) / 15000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        const opacity = (1 - dist / 120) * 0.15;
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(99, 102, 241, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            connectParticles();
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();
        window.addEventListener('resize', initParticles);

        // ==================== IndexedDB ====================
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('LifeProgressDB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('users')) {
                        const userStore = db.createObjectStore('users', { keyPath: 'id', autoIncrement: true });
                        userStore.createIndex('username', 'username', { unique: true });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        // ==================== Tab切换 ====================
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(tab === 'login' ? 'loginPanel' : 'registerPanel').classList.add('active');
        }

        // ==================== Toast ====================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ==================== 登录 ====================
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showToast('请填写所有字段', 'error');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';

            try {
                const db = await openDB();
                const tx = db.transaction('users', 'readonly');
                const store = tx.objectStore('users');
                const index = store.index('username');
                const request = index.get(username);

                request.onsuccess = () => {
                    const user = request.result;
                    if (!user) {
                        showToast('用户名不存在', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> 登录';
                        return;
                    }
                    if (user.password !== password) {
                        showToast('密码错误', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> 登录';
                        return;
                    }
                    // 存储到localStorage
                    localStorage.setItem('currentUser', JSON.stringify({
                        id: user.id,
                        username: user.username,
                        nickname: user.nickname
                    }));
                    showToast('登录成功！欢迎回来', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                };

                request.onerror = () => {
                    showToast('登录失败，请重试', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> 登录';
                };
            } catch (err) {
                showToast('系统错误：' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> 登录';
            }
        }

        // ==================== 注册 ====================
        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (!username || !nickname || !password || !confirm) {
                showToast('请填写所有字段', 'error');
                return;
            }

            if (username.length < 3) {
                showToast('用户名至少3个字符', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('密码至少6位', 'error');
                return;
            }

            if (password !== confirm) {
                showToast('两次密码不一致', 'error');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';

            try {
                const db = await openDB();
                const tx = db.transaction('users', 'readwrite');
                const store = tx.objectStore('users');
                const index = store.index('username');

                // 检查用户名是否已存在
                const checkReq = index.get(username);
                checkReq.onsuccess = () => {
                    if (checkReq.result) {
                        showToast('用户名已存在', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-user-check"></i> 注册';
                        return;
                    }

                    // 插入新用户
                    const newUser = {
                        username: username,
                        password: password,
                        nickname: nickname,
                        createdAt: new Date().toISOString()
                    };
                    const addReq = store.add(newUser);
                    addReq.onsuccess = () => {
                        showToast('注册成功！请登录', 'success');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-user-check"></i> 注册';
                        // 切换到登录Tab
                        setTimeout(() => {
                            switchTab('login');
                            document.getElementById('loginUsername').value = username;
                            document.getElementById('loginPassword').focus();
                        }, 500);
                    };
                    addReq.onerror = () => {
                        showToast('注册失败，请重试', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-user-check"></i> 注册';
                    };
                };
                checkReq.onerror = () => {
                    showToast('系统错误，请重试', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-check"></i> 注册';
                };
            } catch (err) {
                showToast('系统错误：' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-check"></i> 注册';
            }
        }

        // ==================== 检查是否已登录 ====================
        (function checkAuth() {
            const user = localStorage.getItem('currentUser');
            if (user) {
                try {
                    const parsed = JSON.parse(user);
                    if (parsed.id && parsed.username) {
                        window.location.href = 'index.html';
                    }
                } catch (e) {
                    localStorage.removeItem('currentUser');
                }
            }
        })();
    </script>
</body>
</html>
